<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ainterest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 左栏 -->
<div class="sidebar">

  <div class="nav logo">A</div>

  <div class="nav">🏠</div>

  <div class="nav">📋</div>

  <div class="nav">＋</div>

  <div class="nav">🔔</div>

  <div class="nav">💬</div>

  <div class="spacer"></div>

  <div class="nav">⚙️</div>

</div>

  <!-- 上栏 -->
  <div class="header">
    <div class="top-bar">

      <!-- 搜索框 -->
      <div class="search-container">
        <div class="search-box">
          <span class="search-icon">🔍</span>
        </div>
      </div>

      <!-- 头像 -->
      <img src=""
           class="avatar">

      <!-- 小三角 -->
      <div class="arrow">▾</div>

    </div>
  </div>

  <!-- 内容区 -->
<div class="content">
 <div class="card">

  <img src="">

  <details class="menu">
    <summary>⋯</summary>

    <div class="menu-box">
      <div>Like</div>
      <div>Not interested</div>
      <div>Hide</div>
      <div>Report</div>
    </div>

  </details>

</div>

</html>
